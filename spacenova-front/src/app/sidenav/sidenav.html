<button (click)="toggleMenu()" class="sidenav-btn">
    <mat-icon>menu</mat-icon>

</button>
<mat-sidenav-container class="sidenav-conteiner">
    
  <mat-sidenav class="sidenav-list" mode="side" opened="{{openmenu}}">
    <mat-nav-list class="sidenav-items">
        @for (item of menuItems; track item.text) {
            <a mat-list-item  class="sidenav-item-link">
                <mat-icon matListItemIcon class="item-link-icon">{{ item.icon }}</mat-icon>
                <span matListItemTitle class="item-link-text">{{ item.text }}</span>
            </a>
        }
    </mat-nav-list>
    </mat-sidenav>
  <mat-sidenav-content>
        <ng-content>
    
        </ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
